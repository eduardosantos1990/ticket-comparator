<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ingressos Orlando - Comparador Oficial</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800">

<!-- Header -->
<header class="bg-blue-900 text-white p-6 shadow-md">
  <div class="max-w-6xl mx-auto flex justify-between items-center">
    <h1 class="text-2xl font-bold">🎢 Comparador Orlando</h1>
    <span class="text-sm">Disney • Universal • SeaWorld • Busch Gardens</span>
  </div>
</header>

<!-- Hero -->
<section class="bg-white py-10 shadow-sm">
  <div class="max-w-6xl mx-auto text-center">
    <h2 class="text-3xl font-bold mb-4">Compare preços reais de ingressos</h2>
    <p class="text-gray-600 mb-6">Encontre o menor preço entre agências oficiais e afiliadas</p>

    <div class="flex justify-center gap-4">
      <select id="parkFilter" class="p-3 border rounded-lg shadow-sm">
        <option value="Todos">Todos os parques</option>
        <option value="Disney">Disney</option>
        <option value="Universal">Universal</option>
        <option value="SeaWorld">SeaWorld</option>
        <option value="Busch Gardens">Busch Gardens</option>
      </select>

      <button onclick="sortByPrice()" class="bg-blue-900 text-white px-5 py-3 rounded-lg hover:bg-blue-800">
        Ordenar por menor preço
      </button>
    </div>
  </div>
</section>

<!-- Results -->
<section class="py-10">
  <div class="max-w-6xl mx-auto">
    <div id="cardsContainer" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
  </div>
</section>

<!-- Footer -->
<footer class="bg-gray-900 text-gray-400 text-center p-6 mt-10">
  © 2026 Comparador Orlando • Site afiliado
</footer>

<script>
let ticketsGlobal = [];

async function loadTickets() {
  const response = await fetch("https://SUA_API_RENDER.onrender.com/api/tickets");
  const tickets = await response.json();
  ticketsGlobal = tickets;
  renderCards(tickets);
}

function renderCards(data) {
  const container = document.getElementById("cardsContainer");
  container.innerHTML = "";

  if (!data.length) {
    container.innerHTML = "<p>Nenhum resultado encontrado</p>";
    return;
  }

  const minPrice = Math.min(...data.map(t => t.price));

  data.forEach(ticket => {
    const isBest = ticket.price === minPrice;

    container.innerHTML += `
      <div class="bg-white p-6 rounded-2xl shadow-md hover:shadow-lg transition">
        ${isBest ? '<span class="bg-green-100 text-green-700 px-3 py-1 text-xs rounded-full">Melhor Preço</span>' : ''}
        <h3 class="text-lg font-bold mt-3">${ticket.title}</h3>
        <p class="text-sm text-gray-500 mt-1">${ticket.park} • ${ticket.vendor}</p>
        <p class="text-2xl font-bold text-blue-900 mt-4">$ ${ticket.price}</p>
        <a href="${ticket.url}" target="_blank" 
          class="block mt-4 bg-blue-900 text-white text-center py-2 rounded-lg hover:bg-blue-800">
          Comprar Agora
        </a>
      </div>
    `;
  });
}

function sortByPrice() {
  const sorted = [...ticketsGlobal].sort((a,b) => a.price - b.price);
  renderCards(sorted);
}

document.getElementById("parkFilter").addEventListener("change", function() {
  const selected = this.value;
  if(selected === "Todos") {
    renderCards(ticketsGlobal);
  } else {
    const filtered = ticketsGlobal.filter(t => t.park === selected);
    renderCards(filtered);
  }
});

loadTickets();
</script>

</body>
</html>
